# --- Infra: Docker Compose (dev) ---
# This file lives in the backend repo for reference.
# On the EC2 server, it is placed at /opt/fit/dev/docker-compose.yml

services:
  api:
    image: ${API_IMAGE:-ghcr.io/OWNER/fit-backend/api:dev-latest}
    container_name: fit-api-dev
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - fit-network

  postgres:
    image: postgres:17-alpine
    container_name: fit-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fit-network

  redis:
    image: redis:8-alpine
    container_name: fit-redis-dev
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis-data:/data
    networks:
      - fit-network

  # --- Web sites are added as separate services ---
  # promo:
  #   image: ${PROMO_IMAGE:-ghcr.io/OWNER/fit-web/promo:dev-latest}
  #   container_name: fit-promo-dev
  #   restart: unless-stopped
  #   ports:
  #     - "127.0.0.1:4001:3000"
  #   networks:
  #     - fit-network

  # blog-math:
  #   image: ${BLOG_MATH_IMAGE:-ghcr.io/OWNER/fit-web/blog-math:dev-latest}
  #   container_name: fit-blog-math-dev
  #   restart: unless-stopped
  #   ports:
  #     - "127.0.0.1:4002:3000"
  #   networks:
  #     - fit-network

  nginx:
    image: nginx:1.27-alpine
    container_name: fit-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../shared/nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
    networks:
      - fit-network

volumes:
  postgres-data:
  redis-data:

networks:
  fit-network:
    driver: bridge
