# fit-system.net — API + Promo site
server {
    listen 80;
    server_name fit-system.net www.fit-system.net;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name fit-system.net www.fit-system.net;

    ssl_certificate     /etc/letsencrypt/live/fit-system.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fit-system.net/privkey.pem;

    # API reverse proxy
    location /api {
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
    }

    # Promo site
    location / {
        proxy_pass http://promo:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

